<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal</title>
  <link rel="icon" type="image/svg+xml" href="terminal-icon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" integrity="sha384-LJcOxlx9IMbNXDqJ2axpfEQKkAYbFjJfhXexLfiRJhjDU81mzgkiQq8rkV0j6dVh" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>
<body class="terminal-page">
  <div class="top-bar">
    <div class="top-bar-logo">
      <img src="terminal-icon.svg" alt="">
      <span>Term</span>
    </div>
    <div id="tab-bar" class="tab-bar"></div>
    <div class="top-bar-actions">
      <button id="btn-new-tab" class="btn-action btn-action-shell">+ shell</button>
      <button id="btn-new-ssh" class="btn-action">⌁ ssh</button>
      <a href="#" class="btn-action btn-logout" id="btn-logout">exit</a>
    </div>
  </div>

  <div id="terminal-container">
    <div id="empty-state">
      <div class="empty-state-content">
        <img src="terminal-icon.svg" alt="" class="empty-state-icon">
        <div class="empty-state-title">No open terminals</div>
        <div class="empty-state-actions">
          <button class="primary" onclick="document.getElementById('btn-new-tab').click()">+ New shell</button>
          <button onclick="document.getElementById('btn-new-ssh').click()">⌁ SSH connect</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SSH Modal -->
  <div id="ssh-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-title">SSH Connection</div>
      <div class="form-group">
        <label>Host</label>
        <input id="ssh-host" type="text" placeholder="hostname or IP">
      </div>
      <div class="form-group">
        <label>Port</label>
        <input id="ssh-port" type="number" value="22">
      </div>
      <div class="form-group">
        <label>Username</label>
        <input id="ssh-user" type="text">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="ssh-pass" type="password">
      </div>
      <div class="modal-actions">
        <button id="btn-ssh-connect" class="btn-primary">Connect</button>
        <button id="btn-ssh-cancel" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js" integrity="sha384-/nfmYPUzWMS6v2atn8hbljz7NE0EI1iGx34lJaNzyVjWGDzMv+ciUZUeJpKA3Glc" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js" integrity="sha384-AQLWHRKAgdTxkolJcLOELg4E9rE89CPE2xMy3tIRFn08NcGKPTsELdvKomqji+DL" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
